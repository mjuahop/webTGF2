<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clasificador Médico</title>
  <style>
    body {
      font-family: Arial;
      background: #0f2027;
      color: white;
      padding: 40px;
    }

    .box {
      background: #1c2b36;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 25px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #0072ff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .resultado {
      margin-top: 15px;
      background: #2c5364;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>Clasificador Médico</h1>

<div class="box">
  <h2>Clasificación manual</h2>
  <textarea id="texto"></textarea>
  <br>
  <button onclick="clasificar()">Clasificar</button>
  <div id="resultado"></div>
</div>

<div class="box">
  <h2>Clasificación por Excel</h2>
  <input type="file" id="file">
  <br>
  <button onclick="subirExcel()">Procesar Excel</button>
  <p id="estado"></p>
</div>

<div class="box">
  <h2>Historial</h2>
  <button onclick="mostrarHistorial()">Actualizar</button>
  <div id="historial"></div>
</div>

<script>

async function clasificar() {
  const texto = document.getElementById("texto").value;

  const res = await fetch("https://webtfg.onrender.com/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text: texto })
  });

  const data = await res.json();

  let html = "";
  data.predicciones.forEach(p => {
    html += `<div class="resultado">${p.clase} → ${p.prob}%</div>`;
  });

  document.getElementById("resultado").innerHTML = html;
}

async function subirExcel() {
  const fileInput = document.getElementById("file");
  const estado = document.getElementById("estado");

  if (fileInput.files.length === 0) {
    estado.innerText = "Selecciona archivo";
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  estado.innerText = "Procesando...";

  const res = await fetch("https://webtfg.onrender.com/predict_excel", {
    method: "POST",
    body: formData
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "resultado.xlsx";
  a.click();

  estado.innerText = "Descargado";
}

async function mostrarHistorial() {
  const res = await fetch("https://webtfg.onrender.com/historial");
  const data = await res.json();

  let html = "";

  data.slice(-5).reverse().forEach(fila => {
    html += `
      <div class="resultado">
        ${fila.texto}<br>
        ${fila.clase_1} (${fila.prob_1}%) |
        ${fila.clase_2} (${fila.prob_2}%) |
        ${fila.clase_3} (${fila.prob_3}%)
      </div>
    `;
  });

  document.getElementById("historial").innerHTML = html;
}

</script>

</body>
</html>
